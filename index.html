<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>我的日程</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#6B8CAE 0%,#8FA8C4 30%,#B8C8DC 60%,#D4DCE8 85%,#E8EDF4 100%);
  background-attachment:fixed;
  font-family:'DM Sans','PingFang SC','Hiragino Sans GB',sans-serif;
  color:#1A2030;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3);border-radius:4px}
input,textarea,button{font-family:inherit;}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{opacity:0.5;cursor:pointer;}

#app{max-width:440px;margin:0 auto;padding:0 0 100px;}

/* header */
.header{padding:48px 24px 20px;animation:fadeIn 0.5s ease;}
.header .day-label{font-size:13px;color:rgba(255,255,255,0.65);letter-spacing:0.5px;margin-bottom:4px;}
.header h1{font-family:'DM Serif Display',serif;font-size:34px;color:#fff;font-weight:400;line-height:1.1;}
.header .sub{margin-top:6px;font-size:13px;color:rgba(255,255,255,0.7);}

/* tabs */
.tabs{display:flex;margin:0 24px 20px;background:rgba(255,255,255,0.18);border-radius:14px;padding:4px;gap:4px;}
.tab-btn{flex:1;padding:9px;border:none;border-radius:11px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;background:transparent;color:rgba(255,255,255,0.8);}
.tab-btn.active{background:rgba(255,255,255,0.85);color:#1A2030;font-weight:600;}

/* week strip */
.week-card{margin:0 24px 20px;padding:16px;background:rgba(255,255,255,0.22);backdrop-filter:blur(12px);border-radius:18px;border:1px solid rgba(255,255,255,0.35);}
.week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.week-nav button{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.7);font-size:20px;padding:0 6px;line-height:1;}
.week-nav span{font-size:12px;color:rgba(255,255,255,0.8);font-weight:500;}
.week-days{display:flex;justify-content:space-between;}
.day-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 6px;border:none;border-radius:12px;cursor:pointer;transition:all 0.18s;background:transparent;min-width:40px;}
.day-btn.selected{background:rgba(255,255,255,0.85);}
.day-btn .wl{font-size:11px;color:rgba(255,255,255,0.65);font-weight:500;}
.day-btn.selected .wl{color:#1A2030;}
.day-btn .dn{font-size:17px;font-weight:700;line-height:1;color:rgba(255,255,255,0.85);}
.day-btn.selected .dn{color:#1A2030;}
.day-btn.today-btn .dn{color:#fff;}
.day-dot{width:5px;height:5px;border-radius:50%;background:transparent;}
.day-btn.has-dot .day-dot{background:rgba(255,255,255,0.9);}
.day-btn.selected.has-dot .day-dot{background:#6B8CAE;}

/* section header */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin:0 24px 10px;}
.sec-title{font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;}
.add-btn{background:rgba(255,255,255,0.25);border:none;border-radius:10px;padding:6px 14px;cursor:pointer;color:#fff;font-size:13px;font-weight:600;}

/* event row */
.section-events{margin:0 24px 28px;animation:fadeIn 0.3s ease;}
.event-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.55);backdrop-filter:blur(8px);border-radius:14px;margin-bottom:8px;cursor:pointer;border:1px solid rgba(255,255,255,0.7);transition:all 0.18s;}
.event-row:hover{background:rgba(255,255,255,0.75);}
.event-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.event-title{font-weight:600;font-size:14px;color:#1A2030;margin-bottom:2px;font-family:'DM Serif Display',serif;}
.event-sub{font-size:12px;color:#6E7A90;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-hint{text-align:center;padding:20px 0;color:rgba(255,255,255,0.4);font-size:13px;}

/* all upcoming */
.all-upcoming{margin:0 24px;animation:fadeIn 0.4s ease;}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.divider-line{flex:1;height:1px;background:rgba(255,255,255,0.2);}
.divider-label{font-size:12px;color:rgba(255,255,255,0.55);font-weight:500;letter-spacing:0.5px;}
.date-group{margin-bottom:20px;}
.date-group-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.date-group-label{font-size:13px;font-weight:600;color:#fff;font-family:'DM Serif Display',serif;}
.date-group-count{font-size:11px;color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.12);padding:2px 8px;border-radius:10px;}

/* trip card */
.trips-section{margin:0 24px;animation:fadeIn 0.3s ease;}
.trip-card{padding:16px 18px;background:rgba(255,255,255,0.5);backdrop-filter:blur(12px);border-radius:18px;border:1px solid rgba(255,255,255,0.7);cursor:pointer;transition:all 0.2s;margin-bottom:10px;}
.trip-card:hover{background:rgba(255,255,255,0.7);}
.trip-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.trip-emoji{font-size:26px;}
.trip-name{font-weight:700;font-size:16px;color:#1A2030;font-family:'DM Serif Display',serif;}
.trip-country{font-size:12px;color:#6E7A90;}
.trip-notes{font-size:12px;color:#7A8499;margin-top:4px;padding-left:36px;line-height:1.5;}
.pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;}
.status-legend{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.18);}
.legend-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.legend-label{font-size:11px;color:rgba(255,255,255,0.75);font-weight:500;}

/* FAB */
.fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:52px;height:52px;border-radius:50%;background:rgba(26,32,48,0.85);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,0.3);color:#fff;font-size:22px;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,0.25);transition:transform 0.2s;display:flex;align-items:center;justify-content:center;}
.fab:hover{transform:translateX(-50%) scale(1.08);}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(15,20,35,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:rgba(240,244,252,0.97);backdrop-filter:blur(20px);border-radius:22px;padding:26px 22px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.22);animation:slideUp 0.25s cubic-bezier(0.34,1.4,0.64,1);max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-header h3{font-family:'DM Serif Display',serif;font-size:18px;color:#1A2030;}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:#9AA;padding:0 4px;}
.modal-body{display:flex;flex-direction:column;gap:12px;}
.modal-input{width:100%;padding:10px 14px;border:1.5px solid rgba(110,122,144,0.2);border-radius:12px;background:rgba(255,255,255,0.6);font-size:14px;color:#1A2030;outline:none;}
.modal-input:focus{border-color:rgba(107,140,174,0.5);}
.cat-row{display:flex;gap:8px;flex-wrap:wrap;}
.cat-btn{flex:1 0 auto;min-width:54px;padding:8px 6px;border-radius:10px;cursor:pointer;font-size:11px;transition:all 0.15s;text-align:center;line-height:1.6;}
.time-row{display:flex;gap:10px;}
.time-row .modal-input{flex:1;}
.modal-footer{display:flex;gap:10px;margin-top:4px;}
.del-btn{padding:10px 14px;border:1.5px solid rgba(200,100,80,0.3);border-radius:12px;background:none;color:#C06050;cursor:pointer;font-size:13px;}
.save-btn{flex:1;padding:11px;background:#1A2030;border:none;border-radius:12px;color:#fff;cursor:pointer;font-size:14px;font-weight:600;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;}
.emoji-btn{width:40px;height:40px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.status-row{display:flex;gap:8px;}
.status-btn{flex:1;padding:9px 6px;border-radius:10px;cursor:pointer;font-size:12px;transition:all 0.15s;}
.trip-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.trip-section-title{font-family:'DM Serif Display',serif;font-size:20px;color:#fff;line-height:1.2;}
.trip-section-sub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:2px;}

/* detail modal */
.detail-box{background:rgba(240,244,252,0.97);backdrop-filter:blur(20px);border-radius:22px;padding:26px 22px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,0.22);animation:slideUp 0.25s cubic-bezier(0.34,1.4,0.64,1);}
.detail-title{font-family:'DM Serif Display',serif;font-size:22px;color:#1A2030;margin-bottom:16px;}
.detail-row{display:flex;gap:8px;margin-bottom:10px;font-size:14px;color:#4A5568;line-height:1.5;}
.detail-row .icon{flex-shrink:0;}
.detail-notes{white-space:pre-line;font-size:13px;color:#6E7A90;line-height:1.7;margin-top:6px;}
.detail-footer{display:flex;gap:10px;margin-top:20px;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="day-label" id="weekdayLabel"></div>
    <h1 id="mainTitle"></h1>
    <div class="sub" id="subLabel"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tabSchedule" onclick="switchTab('schedule')">🗓 日程</button>
    <button class="tab-btn" id="tabTravel" onclick="switchTab('travel')">✈️ 旅游计划</button>
  </div>

  <div id="scheduleView">
    <div class="week-card">
      <div class="week-nav">
        <button onclick="shiftWeek(-7)">‹</button>
        <span id="weekRangeLabel"></span>
        <button onclick="shiftWeek(7)">›</button>
      </div>
      <div class="week-days" id="weekDaysRow"></div>
    </div>

    <div class="section-events">
      <div class="sec-header">
        <span class="sec-title" id="daySectionTitle"></span>
        <button class="add-btn" onclick="openEventModal(null)">+ 添加</button>
      </div>
      <div id="dayEventsList"></div>
    </div>

    <div class="all-upcoming" id="allUpcomingSection">
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-label">所有安排</span>
        <div class="divider-line"></div>
      </div>
      <div id="allUpcomingList"></div>
    </div>
  </div>

  <div id="travelView" style="display:none;">
    <div class="trips-section">
      <div class="trip-header-row">
        <div>
          <div class="trip-section-title">旅游计划</div>
          <div class="trip-section-sub" id="tripCount"></div>
        </div>
        <button class="add-btn" onclick="openTripModal(null)">+ 添加</button>
      </div>
      <div class="status-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#A87CE8"></span><span class="legend-label">梦想中</span></div>
        <div class="legend-item"><span class="legend-dot" style="background:#7CA8E8"></span><span class="legend-label">计划中</span></div>
        <div class="legend-item"><span class="legend-dot" style="background:#7CBE8A"></span><span class="legend-label">已预订</span></div>
      </div>
      <div id="tripList"></div>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="fabClick()">＋</button>

<!-- EVENT MODAL -->
<div class="overlay" id="eventOverlay" style="display:none;" onclick="overlayClick(event,'eventOverlay')">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="eventModalTitle">添加日程</h3>
      <button class="modal-close" onclick="closeEventModal()">✕</button>
    </div>
    <div class="modal-body">
      <input class="modal-input" id="evTitle" placeholder="标题 *"/>
      <div class="cat-row" id="catRow"></div>
      <input class="modal-input" id="evDate" type="date"/>
      <div class="time-row">
        <input class="modal-input" id="evTime" type="time" placeholder="开始时间"/>
        <input class="modal-input" id="evEndTime" type="time" placeholder="结束时间"/>
      </div>
      <input class="modal-input" id="evLocation" placeholder="📍 地点"/>
      <textarea class="modal-input" id="evNotes" rows="2" placeholder="备注..." style="resize:none;line-height:1.6;"></textarea>
      <div class="modal-footer">
        <button class="del-btn" id="evDelBtn" onclick="deleteCurrentEvent()" style="display:none;">删除</button>
        <button class="save-btn" onclick="saveEvent()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- TRIP MODAL -->
<div class="overlay" id="tripOverlay" style="display:none;" onclick="overlayClick(event,'tripOverlay')">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="tripModalTitle">添加旅游计划</h3>
      <button class="modal-close" onclick="closeTripModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="emoji-grid" id="emojiGrid"></div>
      <input class="modal-input" id="trDest" placeholder="目的地 *（如：京都）"/>
      <input class="modal-input" id="trCountry" placeholder="国家/地区（如：日本 🇯🇵）"/>
      <div class="status-row" id="statusRow"></div>
      <input class="modal-input" id="trDates" placeholder="计划时间（如：2026年秋）"/>
      <textarea class="modal-input" id="trNotes" rows="3" placeholder="想去的地方、要做的事..." style="resize:none;line-height:1.6;"></textarea>
      <div class="modal-footer">
        <button class="del-btn" id="trDelBtn" onclick="deleteCurrentTrip()" style="display:none;">删除</button>
        <button class="save-btn" onclick="saveTrip()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay" style="display:none;" onclick="overlayClick(event,'detailOverlay')">
  <div class="detail-box">
    <div class="modal-header">
      <h3 class="detail-title" id="detailTitle" style="margin:0;font-size:20px;"></h3>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailBody"></div>
    <div class="modal-footer">
      <button class="del-btn" onclick="deleteFromDetail()">删除</button>
      <button class="save-btn" onclick="editFromDetail()">编辑</button>
    </div>
  </div>
</div>

<script>
// ── data ──────────────────────────────────────────────────
const STORAGE_KEY = 'sherry-schedule-v1';
const TRIP_KEY    = 'sherry-trips-v1';

const DEFAULT_EVENTS = [
  {id:"e1",title:"晚餐预订",date:"2026-06-08",time:"18:30",endTime:"20:45",category:"dining",location:"深圳南山区臻湾汇斜对面",notes:"准时到，保留15分钟。避免闪光灯、浓香水，不能自带酒水。"},
  {id:"e2",title:"午餐 · 东湾 The Bay by Chef Fei",date:"2026-06-09",time:"11:00",endTime:"12:30",category:"dining",location:"深圳福田区深业上城文华东方酒店 · 2层落客区对面乘专属电梯至1层",notes:"桌号 A2 · 1位\n餐位保留10分钟，请准时\n📞 139 2523 4541\n🅿️ 停车：深业上城地下，B2-B区(208-244) 或 B3-F区(35-77)→文华东方指示牌→东湾展示牌→专属电梯至1层"},
];
const DEFAULT_TRIPS = [
  {id:"t1",dest:"京都",country:"日本 🇯🇵",emoji:"⛩️",status:"dreaming",dates:"",notes:"岚山竹林、伏见稻荷、茶道体验"},
  {id:"t2",dest:"巴塞罗那",country:"西班牙 🇪🇸",emoji:"🏛️",status:"planning",dates:"2026秋",notes:"高迪建筑、海鲜饭"},
];

const EMOJI_MAP  = {dining:"🍽️",work:"💼",personal:"🌿",travel:"✈️",other:"📌"};
const CAT_COLORS = {dining:"#E8A87C",work:"#7CA8E8",personal:"#7CBE8A",travel:"#A87CE8",other:"#B0A090"};
const CAT_LABELS = {dining:"餐饮",work:"工作",personal:"个人",travel:"出行",other:"其他"};
const STATUS_CFG = {
  dreaming:{label:"梦想中",color:"#A87CE8",bg:"rgba(168,124,232,0.12)"},
  planning:{label:"计划中",color:"#7CA8E8",bg:"rgba(124,168,232,0.12)"},
  booked:  {label:"已预订",color:"#7CBE8A",bg:"rgba(124,190,138,0.12)"},
};
const TRIP_EMOJIS = ["✈️","⛩️","🏛️","🗼","🏝️","🗻","🏰","🌏","🚢","🎭","🍜","🧳"];
const WEEKDAY_EN  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const WEEKDAY_ZH  = ["周日","周一","周二","周三","周四","周五","周六"];
const WLABELS     = ["M","T","W","T","F","S","S"];

// ── state ─────────────────────────────────────────────────
let events = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null') || DEFAULT_EVENTS;
let trips  = JSON.parse(localStorage.getItem(TRIP_KEY)||'null')    || DEFAULT_TRIPS;

const todayDate = new Date();
const pad = n => String(n).padStart(2,'0');
const toISO = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayStr = toISO(todayDate);

let selectedDate = todayStr;
let weekBase = new Date(todayDate);
let currentTab = 'schedule';
let editingEventId = null;
let editingTripId  = null;
let detailEventId  = null;
let selectedTripEmoji = "✈️";
let selectedTripStatus = "dreaming";
let selectedCategory = "other";

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  localStorage.setItem(TRIP_KEY,    JSON.stringify(trips));
}

// ── helpers ───────────────────────────────────────────────
function hexToRgb(hex){
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}
function getWeekDays(base){
  const d=new Date(base), day=d.getDay(), mon=new Date(d);
  mon.setDate(d.getDate()-((day+6)%7));
  return Array.from({length:7},(_,i)=>{const x=new Date(mon);x.setDate(mon.getDate()+i);return x;});
}
function dayLabel(dateStr){
  const d=new Date(dateStr+'T00:00:00'), diff=Math.round((d-new Date(todayStr+'T00:00:00'))/86400000);
  if(diff===0) return '今天';
  if(diff===1) return '明天';
  return `${d.getMonth()+1}月${d.getDate()}日 ${WEEKDAY_ZH[d.getDay()]}`;
}
function headerLabel(dateStr){
  const d=new Date(dateStr+'T00:00:00'), diff=Math.round((d-new Date(todayStr+'T00:00:00'))/86400000);
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  if(diff===-1) return 'Yesterday';
  return `${WEEKDAY_EN[d.getDay()]}, ${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
}

// ── render ────────────────────────────────────────────────
function render(){
  // header
  document.getElementById('weekdayLabel').textContent = todayDate.toLocaleDateString('en-US',{weekday:'long'});
  document.getElementById('mainTitle').textContent = headerLabel(selectedDate);
  const upcoming = events.filter(e=>e.date>=todayStr).length;
  document.getElementById('subLabel').textContent =
    `${upcoming>0?upcoming+' upcoming':'No upcoming events'} · ${trips.length} travel plans`;

  if(currentTab==='schedule') renderSchedule();
  else renderTravel();
}

function renderSchedule(){
  const wdays = getWeekDays(weekBase);
  const a=wdays[0],b=wdays[6];
  document.getElementById('weekRangeLabel').textContent =
    `${a.getMonth()+1}月${a.getDate()}日 – ${b.getMonth()+1}月${b.getDate()}日`;

  const dotsOn = new Set(events.map(e=>e.date));
  const row = document.getElementById('weekDaysRow');
  row.innerHTML='';
  wdays.forEach((d,i)=>{
    const ds=toISO(d);
    const isSel=ds===selectedDate, isTod=ds===todayStr, hasDot=dotsOn.has(ds);
    const btn=document.createElement('button');
    btn.className='day-btn'+(isSel?' selected':'')+(isTod?' today-btn':'')+(hasDot?' has-dot':'');
    btn.innerHTML=`<span class="wl">${WLABELS[i]}</span><span class="dn">${d.getDate()}</span><span class="day-dot"></span>`;
    btn.onclick=()=>{selectedDate=ds;render();};
    row.appendChild(btn);
  });

  // day events
  const dayEvs=events.filter(e=>e.date===selectedDate).sort((a,b)=>a.time.localeCompare(b.time));
  const t=document.getElementById('daySectionTitle');
  t.textContent=`${dayLabel(selectedDate)}  ${dayEvs.length>0?dayEvs.length+' 个安排':'暂无安排'}`;
  const list=document.getElementById('dayEventsList');
  list.innerHTML='';
  if(dayEvs.length===0){
    list.innerHTML='<div class="empty-hint">点击 + 添加日程</div>';
  } else {
    dayEvs.forEach(ev=>list.appendChild(makeEventRow(ev)));
  }

  // all upcoming
  const allUp=events.filter(e=>e.date>=todayStr).sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
  const sec=document.getElementById('allUpcomingSection');
  const ulEl=document.getElementById('allUpcomingList');
  if(allUp.length===0){sec.style.display='none';return;}
  sec.style.display='block';
  ulEl.innerHTML='';
  const groups=[];
  allUp.forEach(ev=>{
    const last=groups[groups.length-1];
    if(last&&last.date===ev.date) last.evs.push(ev);
    else groups.push({date:ev.date,evs:[ev]});
  });
  groups.forEach(g=>{
    const div=document.createElement('div');
    div.className='date-group';
    div.innerHTML=`<div class="date-group-header"><span class="date-group-label">${dayLabel(g.date)}</span><span class="date-group-count">${g.evs.length} 项</span></div>`;
    g.evs.forEach(ev=>div.appendChild(makeEventRow(ev)));
    ulEl.appendChild(div);
  });
}

function makeEventRow(ev){
  const col=CAT_COLORS[ev.category]||'#B0A090';
  const div=document.createElement('div');
  div.className='event-row';
  div.innerHTML=`
    <div class="event-icon" style="background:rgba(${hexToRgb(col)},0.15)">${EMOJI_MAP[ev.category]||'📌'}</div>
    <div style="flex:1;min-width:0;">
      <div class="event-title">${ev.title}</div>
      <div class="event-sub">${ev.time||''}${ev.endTime?' – '+ev.endTime:''}${ev.location?'  ·  '+ev.location:''}</div>
    </div>`;
  div.onclick=()=>openDetail(ev.id);
  return div;
}

function renderTravel(){
  document.getElementById('tripCount').textContent=`${trips.length} 个目的地`;
  const list=document.getElementById('tripList');
  list.innerHTML='';
  if(trips.length===0){
    list.innerHTML='<div class="empty-hint" style="padding:40px 0;">🌍 添加你的第一个旅游梦想</div>';
    return;
  }
  trips.forEach(tr=>{
    const sc=STATUS_CFG[tr.status];
    const div=document.createElement('div');
    div.className='trip-card';
    div.innerHTML=`
      <div class="trip-top">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="trip-emoji">${tr.emoji}</span>
          <div><div class="trip-name">${tr.dest}</div><div class="trip-country">${tr.country}${tr.dates?' · '+tr.dates:''}</div></div>
        </div>
        <span class="pill" style="background:${sc.bg};color:${sc.color};">${sc.label}</span>
      </div>
      ${tr.notes?`<div class="trip-notes">${tr.notes}</div>`:''}`;
    div.onclick=()=>openTripModal(tr.id);
    list.appendChild(div);
  });
}

// ── tab ───────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.getElementById('scheduleView').style.display=tab==='schedule'?'block':'none';
  document.getElementById('travelView').style.display=tab==='travel'?'block':'none';
  document.getElementById('tabSchedule').className='tab-btn'+(tab==='schedule'?' active':'');
  document.getElementById('tabTravel').className='tab-btn'+(tab==='travel'?' active':'');
  render();
}
function shiftWeek(days){
  weekBase=new Date(weekBase);weekBase.setDate(weekBase.getDate()+days);render();
}
function fabClick(){
  if(currentTab==='travel') openTripModal(null);
  else openEventModal(null);
}

// ── event modal ───────────────────────────────────────────
function buildCatRow(){
  const row=document.getElementById('catRow');row.innerHTML='';
  Object.entries(EMOJI_MAP).forEach(([k,em])=>{
    const col=CAT_COLORS[k];
    const btn=document.createElement('button');
    btn.className='cat-btn';
    btn.id='cat_'+k;
    btn.innerHTML=`${em}<br/>${CAT_LABELS[k]}`;
    btn.onclick=()=>{selectedCategory=k;updateCatRow();};
    row.appendChild(btn);
  });
  updateCatRow();
}
function updateCatRow(){
  Object.keys(EMOJI_MAP).forEach(k=>{
    const btn=document.getElementById('cat_'+k);
    const col=CAT_COLORS[k];
    const active=selectedCategory===k;
    btn.style.border=`1.5px solid ${active?col:'rgba(110,122,144,0.2)'}`;
    btn.style.background=active?`rgba(${hexToRgb(col)},0.1)`:'transparent';
    btn.style.color=active?col:'#9A9A9A';
    btn.style.fontWeight=active?'700':'400';
  });
}

function openEventModal(id){
  editingEventId=id;
  buildCatRow();
  const isNew=!id;
  document.getElementById('eventModalTitle').textContent=isNew?'添加日程':'编辑日程';
  document.getElementById('evDelBtn').style.display=isNew?'none':'block';
  if(isNew){
    document.getElementById('evTitle').value='';
    document.getElementById('evDate').value=selectedDate;
    document.getElementById('evTime').value='';
    document.getElementById('evEndTime').value='';
    document.getElementById('evLocation').value='';
    document.getElementById('evNotes').value='';
    selectedCategory='other';updateCatRow();
  } else {
    const ev=events.find(e=>e.id===id);
    document.getElementById('evTitle').value=ev.title;
    document.getElementById('evDate').value=ev.date;
    document.getElementById('evTime').value=ev.time||'';
    document.getElementById('evEndTime').value=ev.endTime||'';
    document.getElementById('evLocation').value=ev.location||'';
    document.getElementById('evNotes').value=ev.notes||'';
    selectedCategory=ev.category||'other';updateCatRow();
  }
  document.getElementById('eventOverlay').style.display='flex';
}
function closeEventModal(){document.getElementById('eventOverlay').style.display='none';}
function saveEvent(){
  const title=document.getElementById('evTitle').value.trim();
  if(!title) return;
  const ev={
    id:editingEventId||('e'+Date.now()),
    title,date:document.getElementById('evDate').value,
    time:document.getElementById('evTime').value,
    endTime:document.getElementById('evEndTime').value,
    category:selectedCategory,
    location:document.getElementById('evLocation').value.trim(),
    notes:document.getElementById('evNotes').value.trim(),
  };
  if(editingEventId) events=events.map(e=>e.id===editingEventId?ev:e);
  else events.push(ev);
  saveData();closeEventModal();render();
}
function deleteCurrentEvent(){
  if(!editingEventId) return;
  events=events.filter(e=>e.id!==editingEventId);
  saveData();closeEventModal();render();
}

// ── detail modal ──────────────────────────────────────────
function openDetail(id){
  detailEventId=id;
  const ev=events.find(e=>e.id===id);
  document.getElementById('detailTitle').textContent=ev.title;
  let html='';
  if(ev.time) html+=`<div class="detail-row"><span class="icon">🕐</span><span>${ev.time}${ev.endTime?' – '+ev.endTime:''}</span></div>`;
  if(ev.location) html+=`<div class="detail-row"><span class="icon">📍</span><span>${ev.location}</span></div>`;
  if(ev.notes) html+=`<div class="detail-notes">${ev.notes}</div>`;
  document.getElementById('detailBody').innerHTML=html;
  document.getElementById('detailOverlay').style.display='flex';
}
function closeDetail(){document.getElementById('detailOverlay').style.display='none';}
function editFromDetail(){closeDetail();openEventModal(detailEventId);}
function deleteFromDetail(){
  events=events.filter(e=>e.id!==detailEventId);
  saveData();closeDetail();render();
}

// ── trip modal ────────────────────────────────────────────
function buildEmojiGrid(){
  const g=document.getElementById('emojiGrid');g.innerHTML='';
  TRIP_EMOJIS.forEach(em=>{
    const btn=document.createElement('button');
    btn.className='emoji-btn';btn.id='em_'+em;btn.textContent=em;
    btn.onclick=()=>{selectedTripEmoji=em;updateEmojiGrid();};
    g.appendChild(btn);
  });
  updateEmojiGrid();
}
function updateEmojiGrid(){
  TRIP_EMOJIS.forEach(em=>{
    const btn=document.getElementById('em_'+em);
    const active=selectedTripEmoji===em;
    btn.style.border=`2px solid ${active?'#7CA8E8':'rgba(110,122,144,0.2)'}`;
    btn.style.background=active?'rgba(124,168,232,0.12)':'transparent';
  });
}
function buildStatusRow(){
  const row=document.getElementById('statusRow');row.innerHTML='';
  Object.entries(STATUS_CFG).forEach(([k,v])=>{
    const btn=document.createElement('button');
    btn.className='status-btn';btn.id='st_'+k;btn.textContent=v.label;
    btn.onclick=()=>{selectedTripStatus=k;updateStatusRow();};
    row.appendChild(btn);
  });
  updateStatusRow();
}
function updateStatusRow(){
  Object.entries(STATUS_CFG).forEach(([k,v])=>{
    const btn=document.getElementById('st_'+k);
    const active=selectedTripStatus===k;
    btn.style.border=`1.5px solid ${active?v.color:'rgba(110,122,144,0.2)'}`;
    btn.style.background=active?v.bg:'transparent';
    btn.style.color=active?v.color:'#9A9A9A';
    btn.style.fontWeight=active?'700':'400';
  });
}
function openTripModal(id){
  editingTripId=id;
  buildEmojiGrid();buildStatusRow();
  const isNew=!id;
  document.getElementById('tripModalTitle').textContent=isNew?'添加旅游计划':'编辑旅游计划';
  document.getElementById('trDelBtn').style.display=isNew?'none':'block';
  if(isNew){
    document.getElementById('trDest').value='';
    document.getElementById('trCountry').value='';
    document.getElementById('trDates').value='';
    document.getElementById('trNotes').value='';
    selectedTripEmoji='✈️';selectedTripStatus='dreaming';
  } else {
    const tr=trips.find(t=>t.id===id);
    document.getElementById('trDest').value=tr.dest;
    document.getElementById('trCountry').value=tr.country;
    document.getElementById('trDates').value=tr.dates||'';
    document.getElementById('trNotes').value=tr.notes||'';
    selectedTripEmoji=tr.emoji;selectedTripStatus=tr.status;
  }
  updateEmojiGrid();updateStatusRow();
  document.getElementById('tripOverlay').style.display='flex';
}
function closeTripModal(){document.getElementById('tripOverlay').style.display='none';}
function saveTrip(){
  const dest=document.getElementById('trDest').value.trim();
  if(!dest) return;
  const tr={
    id:editingTripId||('t'+Date.now()),
    dest,country:document.getElementById('trCountry').value.trim(),
    emoji:selectedTripEmoji,status:selectedTripStatus,
    dates:document.getElementById('trDates').value.trim(),
    notes:document.getElementById('trNotes').value.trim(),
  };
  if(editingTripId) trips=trips.map(t=>t.id===editingTripId?tr:t);
  else trips.push(tr);
  saveData();closeTripModal();render();
}
function deleteCurrentTrip(){
  if(!editingTripId) return;
  trips=trips.filter(t=>t.id!==editingTripId);
  saveData();closeTripModal();render();
}

function overlayClick(e,id){if(e.target===document.getElementById(id)){
  document.getElementById(id).style.display='none';
}}

// init
render();
</script>
</body>
</html>
